# ================================================================
# Settings
# ================================================================
[settings]
auto_install = false
install_before = "3d"


# ================================================================
# Tools
# ================================================================
[tools]

# Markdown
markdownlint-cli2 = "0.22"

# GitHub Actions
actionlint = "1"
shellcheck = "0.11"
zizmor = "1"

# Other tools
lefthook = "2"
cspell = "9"

# Go
go = "1.26"
golangci-lint = "2"
"go:golang.org/x/vuln/cmd/govulncheck" = "1"


# ================================================================
# Tasks
# See: https://mise.jdx.dev/tasks/toml-tasks.html
# ================================================================

# Global
[tasks.setup]
description = "Setup tools"
run = ["mise trust -yq", "mise install", "lefthook install"]
alias = "s"

[tasks.fix]
description = "Fix all issues"
depends = ["md-fix", "gh-fix"]
alias = "f"

[tasks.check]
description = "Check for all issues"
depends = ["md-check", "gh-check", "spell-check"]
alias = "c"

[tasks.fix-and-check]
run = [{ task = "fix" }, { task = "check" }]
description = "Fix all issues and check for issues"
alias = "fc"

# Markdown
[tasks.md-fix]
description = "Fix Markdown issues"
run = "markdownlint-cli2 '**/*.md' --fix"
alias = "mf"

[tasks.md-check]
description = "Check for Markdown issues"
run = "markdownlint-cli2 '**/*.md'"
alias = "mc"

# GitHub Actions
[tasks.gh-fix]
description = "Fix GitHub Actions workflows"
run = "zizmor --fix=all ."
alias = "ghf"

[tasks.gh-check]
description = "Check GitHub Actions workflows"
run = [
  "actionlint .github/workflows/*.yml",
  "zizmor . --persona=pedantic --min-severity=medium",
]
alias = "ghc"

# Spell Check
[tasks.spell-check]
description = "Check spelling"
run = "cspell . --gitignore --verbose"
alias = "sc"

# Go
[tasks.go-fix]
description = "Run golangci-lint auto-fix (formatting and lint fixes)"
run = "golangci-lint run --fix"

[tasks.go-check]
description = "Run vulnerability scan, linter, and unit tests"
run = [{ task = "go-vuln" }, { task = "go-lint" }, { task = "go-test" }]

[tasks.go-test]
description = "Run tests"
run = "go test -v ./..."

[tasks.go-lint]
description = "Run golangci-lint"
run = "golangci-lint run"

[tasks.go-vuln]
description = "Check for vulnerabilities in dependencies"
run = "govulncheck ./..."

[tasks.go-build]
description = "Build the application"
run = "go build -o bin/gh-check-unpinned ./cmd/gh-check-unpinned"

[tasks.go-run]
description = "Build and run the application"
depends = ["go-build"]
run = "./bin/gh-check-unpinned"

[tasks.go-clean]
description = "Clean build artifacts"
run = ["go clean", "rm -rf bin/", "rm -f coverage.out coverage.html"]

# Release
[tasks.tag-push]
description = "Push release tags to remote"
run = "git push --follow-tags"
